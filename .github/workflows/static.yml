# Generate certificates page and deploy static content to GitHub Pages
name: Generate and Deploy Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  generate-and-deploy:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Run certificate generator
        run: node scripts/generate-html.js

      - name: Prettify generated HTML
        run: npx --yes prettier --write www/index.html

      - name: Commit and push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions@users.noreply.github.com"

          git add www/index.html

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-generate certificates page"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Minify HTML before upload
        run: npx --yes html-minifier-terser www/index.html --collapse-whitespace --remove-comments --minify-css true --minify-js true -o www/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload only www folder
          path: "www"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
